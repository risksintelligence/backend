name: Backend CI/CD

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'database/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RIS_POSTGRES_DSN: postgresql://omoshola@localhost:5432/ris_database
      RIS_REDIS_URL: redis://localhost:6379
      ALERT_DB_URL: postgresql://omoshola@localhost:5432/ris_database
      ALERT_SMTP_HOST: smtp.sendpulse.com
      ALERT_SMTP_PORT: 587
      ALERT_SMTP_USERNAME: your_sendpulse_username
      ALERT_SMTP_PASSWORD: your_sendpulse_password
      ALERT_SMTP_FROM: alerts@risksx.org
      ALERT_WEBHOOK_TOKEN: your_webhook_bearer_token
      RENDER_API_KEY: rnd_fC2WMrcAALB2FUpwcGWwsw6ubW7e
      RENDER_BACKEND_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
      BASE_URL: ${{ secrets.HEALTH_BASE_URL }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Train ML models
        run: |
          bash scripts/train-models.sh
      - name: Trigger Render deploy
        run: |
          bash scripts/deploy.sh
      - name: Run health checks
        run: |
          bash infra/health_check.sh
