# MLflow Configuration for RiskX
# Machine Learning Model Registry and Experiment Tracking

[mlflow]
# Core MLflow Settings
tracking_uri = http://localhost:5000
registry_uri = http://localhost:5000
default_artifact_root = file:///opt/mlflow/artifacts
backend_store_uri = postgresql://mlflow:mlflow@localhost:5432/mlflow
serve_artifacts = true
artifacts_destination = file:///opt/mlflow/artifacts
host = 0.0.0.0
port = 5000
workers = 4
static_prefix = /static
artifact_root = file:///opt/mlflow/artifacts
default_experiment_name = RiskX_Default
enable_proxy_fix = false
expose_prometheus = /metrics

[database]
# Database Configuration for MLflow
engine = postgresql
username = mlflow
password = your_mlflow_db_password
host = localhost
port = 5432
database = mlflow
pool_size = 10
pool_recycle = 3600
pool_pre_ping = true
echo = false

[artifacts]
# Artifact Storage Configuration
default_root = file:///opt/mlflow/artifacts
s3_endpoint_url = 
s3_ignore_tls = false
azure_storage_connection_string = 
azure_storage_access_key = 
gcs_bucket = 
sftp_username = 
sftp_password = 

[logging]
# Logging Configuration
level = INFO
format = %(asctime)s %(levelname)s [%(name)s] %(message)s
file_path = /var/log/mlflow/mlflow.log
max_bytes = 10485760
backup_count = 5

[server]
# Server Configuration
workers = 4
timeout = 30
keep_alive = 2
max_requests = 1000
max_requests_jitter = 50
preload_app = true
bind = 0.0.0.0:5000
worker_class = sync
worker_connections = 1000

[auth]
# Authentication Configuration (if enabled)
auth_backend = 
admin_username = admin
admin_password = your_admin_password
jwt_secret = your_jwt_secret
session_timeout = 3600

[experiments]
# Experiment Configuration
auto_create_experiments = true
default_tags = {
    "project": "riskx",
    "environment": "production",
    "team": "risk_intelligence"
}
experiment_retention_days = 365

[models]
# Model Registry Configuration
model_registry_uri = postgresql://mlflow:mlflow@localhost:5432/mlflow
enable_model_aliases = true
model_version_tags = {
    "validation_status": "pending",
    "deployment_status": "not_deployed",
    "performance_tier": "experimental"
}

[tracking]
# Experiment Tracking Configuration
tracking_username = 
tracking_password = 
tracking_token = 
tracking_insecure_tls = false
registry_username = 
registry_password = 
registry_token = 
registry_insecure_tls = false

[plugins]
# Plugin Configuration
disable_env_manager_conda_install = false
conda_env_cache_dir = 
pip_requirements_cache_dir = 

[ui]
# UI Configuration
page_size = 25
max_experiments_csv_results = 100000
max_runs_csv_results = 100000
artifact_location_warning_threshold = 1000

# RiskX Specific Configuration
[riskx]
# Risk Intelligence Model Configuration
model_categories = [
    "risk_scoring",
    "economic_forecasting", 
    "supply_chain_prediction",
    "financial_stability",
    "explainability"
]

model_validation_metrics = [
    "accuracy",
    "precision", 
    "recall",
    "f1_score",
    "auc_roc",
    "mse",
    "mae",
    "r_squared"
]

model_deployment_stages = [
    "staging",
    "production",
    "archived"
]

auto_promotion_thresholds = {
    "accuracy": 0.85,
    "precision": 0.80,
    "recall": 0.80,
    "f1_score": 0.82,
    "auc_roc": 0.85
}

model_monitoring_interval = 3600
model_drift_threshold = 0.1
model_performance_degradation_threshold = 0.05

# Model Explainability Configuration
explainability_methods = [
    "shap",
    "lime", 
    "permutation_importance",
    "partial_dependence"
]

# Bias Detection Configuration
bias_metrics = [
    "demographic_parity",
    "equal_opportunity",
    "calibration"
]

# Risk Model Specific Settings
risk_model_features = [
    "economic_indicators",
    "financial_metrics", 
    "supply_chain_indicators",
    "disruption_signals",
    "sentiment_indicators"
]

risk_model_targets = [
    "overall_risk_score",
    "sector_risk_scores",
    "time_to_event_predictions"
]

# Model Governance
governance_approval_required = true
governance_reviewers = [
    "risk_team_lead",
    "data_science_lead",
    "compliance_officer"
]

# Performance Monitoring
performance_monitoring_enabled = true
performance_alert_threshold = 0.10
performance_check_interval = 3600

# A/B Testing Configuration
ab_testing_enabled = true
ab_testing_traffic_split = 0.1
ab_testing_duration_days = 14

# Model Retraining
auto_retraining_enabled = true
retraining_performance_threshold = 0.05
retraining_data_drift_threshold = 0.1
retraining_schedule = "0 2 * * 0"  # Weekly on Sunday at 2 AM

# Security
model_encryption_enabled = true
access_control_enabled = true
audit_logging_enabled = true

# Compliance
regulatory_compliance_checks = true
model_documentation_required = true
bias_testing_required = true
explainability_required = true