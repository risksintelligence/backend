apiVersion: v1
kind: ConfigMap
metadata:
  name: riskx-config
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: configuration
data:
  # Application Configuration
  APP_NAME: "RiskX Observatory"
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  
  # Database Configuration
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "riskx"
  POSTGRES_DB: "riskx"
  
  # Redis Configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # API Configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  API_TIMEOUT: "30"
  
  # Frontend Configuration
  FRONTEND_PORT: "3000"
  NEXT_PUBLIC_API_URL: "https://api.riskx.observatory"
  
  # MLflow Configuration
  MLFLOW_TRACKING_URI: "http://mlflow-service:5000"
  MLFLOW_REGISTRY_URI: "http://mlflow-service:5000"
  
  # Airflow Configuration
  AIRFLOW_WEBSERVER_PORT: "8080"
  AIRFLOW_SCHEDULER_HEARTBEAT: "5"
  AIRFLOW_DAG_CONCURRENCY: "16"
  
  # Cache Configuration
  CACHE_TTL: "3600"
  CACHE_MAX_SIZE: "1000"
  
  # Risk Calculation Configuration
  RISK_CALCULATION_INTERVAL: "300"
  ALERT_THRESHOLD_CRITICAL: "80"
  ALERT_THRESHOLD_HIGH: "60"
  ALERT_THRESHOLD_MODERATE: "40"
  
  # Data Source Configuration
  FRED_API_URL: "https://api.stlouisfed.org/fred"
  CENSUS_API_URL: "https://api.census.gov/data"
  BEA_API_URL: "https://apps.bea.gov/api/data"
  BLS_API_URL: "https://api.bls.gov/publicAPI/v2"
  
  # Security Configuration
  CORS_ORIGINS: "https://riskx.observatory,https://www.riskx.observatory"
  ALLOWED_HOSTS: "riskx.observatory,www.riskx.observatory,api.riskx.observatory"
  
  # Monitoring Configuration
  METRICS_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30"
  
  # Professional Standards
  COLOR_SCHEME_PRIMARY: "#1e3a8a"
  COLOR_SCHEME_SECONDARY: "#374151"
  COLOR_SCHEME_BACKGROUND: "#ffffff"
  
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: database
data:
  POSTGRES_DB: "riskx"
  POSTGRES_USER: "riskx_admin"
  PGDATA: "/var/lib/postgresql/data/pgdata"
  
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: cache
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    timeout 0
    tcp-keepalive 300
    databases 16
    save 900 1
    save 300 10
    save 60 10000
    rdbcompression yes
    rdbchecksum yes
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    slowlog-log-slower-than 10000
    slowlog-max-len 128
    latency-monitor-threshold 100
    notify-keyspace-events "AKE"
    
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: ingress
data:
  nginx.conf: |
    upstream api_backend {
        server api-service:8000;
    }
    
    upstream frontend_backend {
        server frontend-service:3000;
    }
    
    server {
        listen 80;
        server_name riskx.observatory www.riskx.observatory;
        
        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';";
        
        # API routes
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # WebSocket routes
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Frontend routes
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }