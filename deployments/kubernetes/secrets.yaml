apiVersion: v1
kind: Secret
metadata:
  name: riskx-secrets
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: secrets
type: Opaque
stringData:
  # Database Secrets
  DATABASE_PASSWORD: "your_database_password_here"
  POSTGRES_PASSWORD: "your_postgres_password_here"
  
  # Redis Secret
  REDIS_PASSWORD: "your_redis_password_here"
  
  # Application Secrets
  SECRET_KEY: "your_application_secret_key_here"
  JWT_SECRET: "your_jwt_secret_here"
  FERNET_KEY: "your_fernet_encryption_key_here"
  
  # API Keys (All Free Government APIs)
  FRED_API_KEY: "your_fred_api_key_here"
  CENSUS_API_KEY: "your_census_api_key_here"
  BEA_API_KEY: "your_bea_api_key_here"
  BLS_API_KEY: "your_bls_api_key_here"
  NOAA_API_KEY: "your_noaa_api_key_here"
  
  # External Service Keys
  SMTP_PASSWORD: "your_smtp_password_here"
  WEBHOOK_TOKEN: "your_webhook_token_here"
  
  # SSL/TLS Certificates (if using custom certs)
  TLS_CERT: "your_tls_certificate_here"
  TLS_KEY: "your_tls_private_key_here"
  
  # MLflow Secrets
  MLFLOW_DB_PASSWORD: "your_mlflow_db_password_here"
  
  # Airflow Secrets
  AIRFLOW_ADMIN_PASSWORD: "your_airflow_admin_password_here"
  AIRFLOW_DB_PASSWORD: "your_airflow_db_password_here"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: database
type: Opaque
stringData:
  POSTGRES_PASSWORD: "your_postgres_password_here"
  POSTGRES_USER: "riskx_admin"

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: cache
type: Opaque
stringData:
  REDIS_PASSWORD: "your_redis_password_here"

---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: ingress
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key
  # Generate with: openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt
  # Then: cat tls.crt | base64 -w 0
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t...

---
# Docker Registry Secret (if using private registry)
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: registry
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6eyJyZWdpc3RyeS5leGFtcGxlLmNvbSI6eyJ1c2VybmFtZSI6InVzZXIiLCJwYXNzd29yZCI6InBhc3N3b3JkIiwiYXV0aCI6ImRYTmxjanB3WVhOemQyOXlaQT09In19fQ==

---
# Monitoring Secrets
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-secrets
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: monitoring
type: Opaque
stringData:
  GRAFANA_ADMIN_PASSWORD: "your_grafana_admin_password_here"
  PROMETHEUS_CONFIG: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    rule_files:
      - "riskx_rules.yml"
    
    scrape_configs:
      - job_name: 'riskx-api'
        static_configs:
          - targets: ['api-service:8000']
        metrics_path: '/api/v1/metrics'
        scrape_interval: 30s
      
      - job_name: 'riskx-frontend'
        static_configs:
          - targets: ['frontend-service:3000']
        metrics_path: '/metrics'
        scrape_interval: 60s
      
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-service:5432']
        scrape_interval: 30s
      
      - job_name: 'redis'
        static_configs:
          - targets: ['redis-service:6379']
        scrape_interval: 30s

---
# Backup Secrets
apiVersion: v1
kind: Secret
metadata:
  name: backup-secrets
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: backup
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "your_aws_access_key_here"
  AWS_SECRET_ACCESS_KEY: "your_aws_secret_key_here"
  S3_BUCKET_NAME: "riskx-backups"
  S3_REGION: "us-east-1"