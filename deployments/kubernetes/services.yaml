apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: ClusterIP
  selector:
    app: risk-intelligence-observatory
    component: api
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  sessionAffinity: None

