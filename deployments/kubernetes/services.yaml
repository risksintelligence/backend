---
# External load balancer service
apiVersion: v1
kind: Service
metadata:
  name: riskx-external-lb
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: load-balancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012"
spec:
  type: LoadBalancer
  loadBalancerSourceRanges:
  - 0.0.0.0/0  # Restrict this in production
  selector:
    app: risk-intelligence-observatory
    component: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: https
    port: 443
    targetPort: 80
    protocol: TCP
  sessionAffinity: None

---
# Node port service for development
apiVersion: v1
kind: Service
metadata:
  name: riskx-nodeport
  namespace: riskx
  labels:
    app: risk-intelligence-observatory
    component: nodeport
spec:
  type: NodePort
  selector:
    app: risk-intelligence-observatory
    component: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 80
    nodePort: 30443
    protocol: TCP