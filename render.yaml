services:
  - type: web
    name: risksx-backend
    env: python
    plan: starter
    pythonVersion: "3.11"
    buildCommand: cd backend && ./build.sh
    startCommand: bash backend/render-start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PIP_ONLY_BINARY
        value: ":all:"
      - key: PIP_PREFER_BINARY
        value: "1"
      - key: RIS_POSTGRES_DSN
        fromDatabase:
          name: dpg-d4bs1tc9c44c738cmsg0-a
          property: connectionString
      - key: RIS_REDIS_URL
        fromService:
          type: redis
          name: dpg-d4bs1tc9c44c738cmsg0-a
          property: connectionString