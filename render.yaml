services:
  - type: web
    name: risksx-backend
    env: python
    plan: starter
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: RIS_POSTGRES_DSN
        fromDatabase:
          name: risksx-db
          property: connectionString
      - key: RIS_REDIS_URL
        fromService:
          type: redis
          name: risksx-redis
          property: connectionString