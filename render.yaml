services:
  - type: web
    name: riskx-backend
    env: python
    plan: free
    runtime: python-3.11.10
    buildCommand: |
      python --version
      pip install --upgrade pip
      pip cache purge
      pip install --only-binary=:all: --no-cache-dir -r requirements.txt
    startCommand: "./start.sh"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL  
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "info"
      - key: PYTHONPATH
        value: "/opt/render/project/src"
      - key: ENVIRONMENT
        value: "production"
    healthCheckPath: /api/v1/health
    
  - type: redis
    name: riskx-redis
    plan: free
    ipAllowList: []
    
  - type: pserv
    name: riskx-postgres
    plan: free
    databaseName: riskx
    user: riskx_user
    ipAllowList: []